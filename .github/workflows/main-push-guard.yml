name: Main Push Guard

# SECURITY: Only triggers on pushes to main.
# Purpose: Enforce that all changes to main come through a merged pull request.
# Direct pushes are reverted automatically and a violation issue is created.
on:
  push:
    branches:
      - main

# Prevent concurrent guard runs — only one revert at a time.
concurrency:
  group: main-push-guard
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  MCP_URL: http://macmini-devserver.taile324e7.ts.net:8008

jobs:
  guard:
    name: Enforce PR-only merges to main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Detect whether push is from a merged PR
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          echo "Commit SHA: ${COMMIT_SHA}"
          echo "Commit message: ${COMMIT_MSG}"

          # Pattern 1: GitHub merge commit — "Merge pull request #NNN"
          if echo "${COMMIT_MSG}" | grep -qE "^Merge pull request #[0-9]+"; then
            echo "Detection method: merge-commit pattern"
            echo "is_pr_merge=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pattern 2: Squash merge — commit message ends with "(#NNN)"
          if echo "${COMMIT_MSG}" | grep -qE "\(#[0-9]+\)$"; then
            echo "Detection method: squash-merge pattern"
            echo "is_pr_merge=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pattern 3: GitHub API — check if any PR is associated with this commit
          PR_COUNT=$(gh api \
            "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
            --jq 'length' 2>/dev/null || echo "0")
          echo "Associated PRs from API: ${PR_COUNT}"

          if [ "${PR_COUNT}" -gt "0" ]; then
            echo "Detection method: GitHub API associated PRs"
            echo "is_pr_merge=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_pr_merge=false" >> "$GITHUB_OUTPUT"
          echo "::warning::No PR association found — treating as direct push violation"

      - name: Allow — push is from a merged PR
        if: steps.detect.outputs.is_pr_merge == 'true'
        run: |
          echo "Push is from a merged pull request. Allowing."
          exit 0

      # ─── Direct push violation path ────────────────────────────────────────

      - name: Revert the direct push
        if: steps.detect.outputs.is_pr_merge == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone with write access using GITHUB_TOKEN
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" repo
          cd repo

          # Revert the offending commit — no editor prompt
          git revert --no-edit "${{ github.sha }}"

          # Force-push the revert back to main
          git push origin main
          echo "Revert pushed to main."

      - name: Create GitHub issue for direct-push violation
        if: steps.detect.outputs.is_pr_merge == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Direct push violation on main by @${ACTOR} (${SHORT_SHA})" \
            --body "## Direct Push Violation Detected

          A commit was pushed directly to \`main\` without going through a pull request. This violates the PR-only merge policy.

          **Details:**
          - **Actor:** @${ACTOR}
          - **Commit SHA:** \`${SHA}\`
          - **Commit message:** ${COMMIT_MSG}
          - **Workflow run:** ${RUN_URL}

          **Action taken:** The commit has been automatically reverted and force-pushed back to \`main\`.

          **Required action:** @${ACTOR} — please open a pull request and go through the normal review process before merging to \`main\`." \
            --label "direct-push-violation" 2>/dev/null || echo "::warning::Failed to create issue (label may not exist yet)"

      - name: Notify MCP journal of direct-push violation
        if: steps.detect.outputs.is_pr_merge == 'false'
        run: |
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"

          # Best-effort notification — do not fail the workflow if MCP is unreachable
          curl -sf --max-time 10 -X POST "${MCP_URL}/api/journals" \
            -H "Content-Type: application/json" \
            -H "X-Service-Key: ${{ secrets.MCP_SERVICE_KEY }}" \
            -d "{
              \"entry\": \"DIRECT PUSH VIOLATION: @${ACTOR} pushed commit ${SHORT_SHA} directly to main on ${REPO}. The commit has been automatically reverted. Workflow run: ${RUN_URL}\"
            }" > /dev/null 2>&1 || echo "::warning::MCP journal notification failed (non-fatal)"

      - name: Fail workflow to make violation visible
        if: steps.detect.outputs.is_pr_merge == 'false'
        run: |
          echo "::error::Direct push to main detected. Commit ${{ github.sha }} by ${{ github.actor }} has been reverted. Please use a pull request to merge changes to main."
          exit 1
