# Reusable manual promote-to-stable job for the QwickApps blue-green pipeline.
# Re-tags an image as stable-* in GHCR and deploys it to the stable slot.

name: Promote App to Stable (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: 'App to promote'
        required: true
        type: string
      image_ref:
        description: |
          Full GHCR image reference to tag as stable and deploy.
          Use the same image_ref that was promoted to live.
        required: true
        type: string
      image_name:
        description: 'Optional GHCR image name without ghcr.io/qwickapps/ prefix. Defaults to img-<app_name>-<environment>.'
        required: false
        type: string
        default: ''
      environment:
        description: 'Target environment for stable slot'
        required: true
        type: string
      health_path:
        description: 'Health path to validate on the stable slot. Defaults to /_health.'
        required: false
        type: string
        default: '/_health'
      caprover_url:
        description: 'Optional explicit CapRover URL. Defaults to the OCI_*_CAPROVER_URL secret for the selected environment.'
        required: false
        type: string
        default: ''
      stable_url:
        description: 'Optional explicit stable slot URL. Defaults to the qwickforge stable slot URL for the selected environment.'
        required: false
        type: string
        default: ''
    secrets:
      OCI_DEV_CAPROVER_URL:
        required: false
      OCI_DEV_CAPROVER_PASSWORD:
        required: false
      OCI_MAIN_CAPROVER_URL:
        required: false
      OCI_MAIN_CAPROVER_PASSWORD:
        required: false
      GHCR_PUSH_TOKEN:
        required: true
      GHCR_PULL_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

concurrency:
  group: promote-stable-${{ inputs.app_name }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  OWNER: qwickapps

jobs:
  promote-to-stable:
    runs-on: [self-hosted, macmini]
    steps:
      - name: Validate inputs
        run: |
          IMAGE_REF="${{ inputs.image_ref }}"
          APP="${{ inputs.app_name }}"
          ENV="${{ inputs.environment }}"
          IMAGE_NAME="${{ inputs.image_name }}"

          if [ -z "$IMAGE_REF" ]; then
            echo "ERROR: image_ref input is required."
            exit 1
          fi

          case "$APP" in
            *[!a-z0-9-]*|""|-*|*-) echo "ERROR: app_name must be a lowercase slug"; exit 1 ;;
          esac
          case "$ENV" in
            dev|uat|prod) ;;
            *)
              echo "ERROR: unsupported environment: $ENV"
              exit 1
              ;;
          esac

          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="img-${APP}-${ENV}"
          fi
          if ! echo "$IMAGE_REF" | grep -Eq "^ghcr.io/qwickapps/${IMAGE_NAME}([:@])"; then
            echo "ERROR: image_ref does not match app/environment."
            echo "  Got: $IMAGE_REF"
            echo "  Expected: ghcr.io/qwickapps/${IMAGE_NAME}:<tag>"
            echo "        or: ghcr.io/qwickapps/${IMAGE_NAME}@sha256:<digest>"
            exit 1
          fi

          if echo "$IMAGE_REF" | grep -q '@sha256:'; then
            BASE_IMAGE_NAME="${IMAGE_REF%@sha256:*}"
            VERSION_TAG="digest-$(echo "${IMAGE_REF##*@sha256:}" | cut -c1-12)"
          else
            BASE_IMAGE_NAME="${IMAGE_REF%:*}"
            VERSION_TAG="${IMAGE_REF##*:}"
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          STABLE_TAG="stable-${VERSION_TAG}-${SHORT_SHA}"

          HEALTH_PATH="${{ inputs.health_path }}"
          case "$HEALTH_PATH" in
            /*) ;;
            *)
              echo "ERROR: health_path must start with /"
              exit 1
              ;;
          esac

          echo "image_ref=${IMAGE_REF}"           >> "$GITHUB_ENV"
          echo "APP_NAME=${APP}"                  >> "$GITHUB_ENV"
          echo "BASE_IMAGE_NAME=${BASE_IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_TAG=${VERSION_TAG}"       >> "$GITHUB_ENV"
          echo "STABLE_TAG=${STABLE_TAG}"         >> "$GITHUB_ENV"
          echo "HEALTH_PATH=${HEALTH_PATH}"       >> "$GITHUB_ENV"
          echo "Stable tag will be: ${STABLE_TAG}"

      - name: Resolve CapRover credentials and slot names
        run: |
          ENV="${{ inputs.environment }}"
          APP="${{ inputs.app_name }}"

          case "$ENV" in
            dev)
              LIVE_APP="${APP}-live"
              STABLE_APP="${APP}-stable"
              CAPROVER_URL="${{ inputs.caprover_url || secrets.OCI_DEV_CAPROVER_URL }}"
              CAPROVER_PASSWORD="${{ secrets.OCI_DEV_CAPROVER_PASSWORD }}"
              STABLE_APP_URL="https://${STABLE_APP}.dev.qwickforge.com"
              ;;
            prod)
              LIVE_APP="${APP}-live"
              STABLE_APP="${APP}-stable"
              CAPROVER_URL="${{ inputs.caprover_url || secrets.OCI_MAIN_CAPROVER_URL }}"
              CAPROVER_PASSWORD="${{ secrets.OCI_MAIN_CAPROVER_PASSWORD }}"
              STABLE_APP_URL="https://${STABLE_APP}.app.qwickforge.com"
              ;;
            uat)
              LIVE_APP="${APP}-uat"
              STABLE_APP="${APP}-uat-stable"
              CAPROVER_URL="${{ inputs.caprover_url || secrets.OCI_MAIN_CAPROVER_URL }}"
              CAPROVER_PASSWORD="${{ secrets.OCI_MAIN_CAPROVER_PASSWORD }}"
              STABLE_APP_URL="https://${STABLE_APP}.app.qwickforge.com"
              ;;
          esac
          if [ -n "${{ inputs.stable_url }}" ]; then
            STABLE_APP_URL="${{ inputs.stable_url }}"
          fi

          if [ -z "$CAPROVER_URL" ] || [ -z "$CAPROVER_PASSWORD" ]; then
            echo "ERROR: CapRover credentials not found for ${ENV}."
            exit 1
          fi

          echo "::add-mask::$CAPROVER_PASSWORD"
          echo "::add-mask::${{ secrets.GHCR_PUSH_TOKEN }}"
          echo "::add-mask::${{ secrets.GHCR_PULL_TOKEN }}"

          echo "LIVE_APP=${LIVE_APP}"                   >> "$GITHUB_ENV"
          echo "STABLE_APP=${STABLE_APP}"               >> "$GITHUB_ENV"
          echo "CAPROVER_URL=${CAPROVER_URL}"           >> "$GITHUB_ENV"
          echo "CAPROVER_PASSWORD=${CAPROVER_PASSWORD}" >> "$GITHUB_ENV"
          echo "STABLE_APP_URL=${STABLE_APP_URL}"       >> "$GITHUB_ENV"
          echo "GHCR_PUSH_TOKEN=${{ secrets.GHCR_PUSH_TOKEN }}" >> "$GITHUB_ENV"
          echo "GHCR_PULL_TOKEN=${{ secrets.GHCR_PULL_TOKEN }}" >> "$GITHUB_ENV"

      - name: Tag image as stable in GHCR
        run: |
          TMPDIR_DOCKER="$(mktemp -d)"
          AUTH_B64=$(printf '%s:%s' "${{ github.actor }}" "${GHCR_PUSH_TOKEN}" | base64 | tr -d '\n')
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "$AUTH_B64" > "$TMPDIR_DOCKER/config.json"
          export DOCKER_CONFIG="$TMPDIR_DOCKER"

          echo "Pulling ${image_ref}..."
          docker --config "$TMPDIR_DOCKER" pull "${image_ref}"

          STABLE_IMAGE_VERSIONED="${BASE_IMAGE_NAME}:${STABLE_TAG}"
          docker --config "$TMPDIR_DOCKER" tag "${image_ref}" "${STABLE_IMAGE_VERSIONED}"
          docker --config "$TMPDIR_DOCKER" push "${STABLE_IMAGE_VERSIONED}"
          echo "Pushed: ${STABLE_IMAGE_VERSIONED}"

          STABLE_IMAGE_LATEST="${BASE_IMAGE_NAME}:stable-latest"
          docker --config "$TMPDIR_DOCKER" tag "${image_ref}" "${STABLE_IMAGE_LATEST}"
          docker --config "$TMPDIR_DOCKER" push "${STABLE_IMAGE_LATEST}"
          echo "Pushed: ${STABLE_IMAGE_LATEST}"

          echo "STABLE_IMAGE_VERSIONED=${STABLE_IMAGE_VERSIONED}" >> "$GITHUB_ENV"
          rm -rf "$TMPDIR_DOCKER"

      - name: Obtain CapRover auth token
        run: |
          TOKEN=$(curl -sf -X POST "${CAPROVER_URL}/api/v2/login" \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${CAPROVER_PASSWORD}\"}" \
            | tr -d '\n' \
            | sed 's/.*"token":"\([^"]*\)".*/\1/')

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to obtain CapRover token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "CAPROVER_TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      - name: Ensure stable slot exists on CapRover
        run: |
          EXISTS=$(curl -sf "${CAPROVER_URL}/api/v2/user/apps/appDefinitions" \
            -H "x-captain-auth: ${CAPROVER_TOKEN}" \
            -H "x-namespace: captain" \
            | tr -d '\n' \
            | grep -o "\"appName\":\"${STABLE_APP}\"" || true)

          if [ -z "$EXISTS" ]; then
            echo "Creating stable app slot '${STABLE_APP}' on CapRover..."
            curl -sf -X POST "${CAPROVER_URL}/api/v2/user/apps/appDefinitions/register" \
              -H "Content-Type: application/json" \
              -H "x-captain-auth: ${CAPROVER_TOKEN}" \
              -H "x-namespace: captain" \
              -d "{\"appName\":\"${STABLE_APP}\",\"hasPersistentData\":false}"
            echo "Stable slot created."
          else
            echo "Stable slot '${STABLE_APP}' already exists."
          fi

      - name: Copy live config to stable slot
        run: |
          DEFS=$(curl -sf "${CAPROVER_URL}/api/v2/user/apps/appDefinitions" \
            -H "x-captain-auth: ${CAPROVER_TOKEN}" \
            -H "x-namespace: captain")

          LIVE_DEF=$(echo "$DEFS" | jq --arg name "$LIVE_APP" '.data.appDefinitions[] | select(.appName == $name)')
          STABLE_DEF=$(echo "$DEFS" | jq --arg name "$STABLE_APP" '.data.appDefinitions[] | select(.appName == $name)')

          if [ -z "$LIVE_DEF" ] || [ "$LIVE_DEF" = "null" ]; then
            echo "ERROR: live app ${LIVE_APP} was not found; promote to live before promoting stable."
            exit 1
          fi
          if [ -z "$STABLE_DEF" ] || [ "$STABLE_DEF" = "null" ]; then
            echo "ERROR: stable app ${STABLE_APP} was not found after registration."
            exit 1
          fi

          ENV_VARS=$(echo "$LIVE_DEF" | jq -c '.envVars // []')
          SVC_OVERRIDE=$(echo "$LIVE_DEF" | jq -r '.serviceUpdateOverride // ""')
          MERGED=$(echo "$STABLE_DEF" | jq --argjson vars "$ENV_VARS" '.envVars = $vars')
          if [ -n "$SVC_OVERRIDE" ]; then
            MERGED=$(echo "$MERGED" | jq --arg override "$SVC_OVERRIDE" '.serviceUpdateOverride = $override')
          fi

          RESPONSE=$(curl -sf -X POST "${CAPROVER_URL}/api/v2/user/apps/appDefinitions/update" \
            -H "Content-Type: application/json" \
            -H "x-captain-auth: ${CAPROVER_TOKEN}" \
            -H "x-namespace: captain" \
            -d "$MERGED")

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "100" ] && [ "$STATUS" != "1000" ]; then
            echo "ERROR: failed to copy live config to stable: $(echo "$RESPONSE" | jq -r '.description // "unknown"')"
            exit 1
          fi
          echo "Copied live env vars and CMD override to ${STABLE_APP}."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy versioned stable image to stable slot
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/deploy-from-ghcr.sh \
            --app-name "$STABLE_APP" \
            --image-ref "$STABLE_IMAGE_VERSIONED" \
            --caprover-url "$CAPROVER_URL" \
            --caprover-password "$CAPROVER_PASSWORD" \
            --github-token "$GHCR_PULL_TOKEN" \
            --github-owner "${{ env.OWNER }}"

      - name: Validate stable slot health
        run: |
          HEALTH_URL="${STABLE_APP_URL}${HEALTH_PATH}"
          echo "Waiting for ${HEALTH_URL} to become healthy..."
          MAX_ATTEMPTS=15
          SLEEP_SEC=20
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            curl -fsS --max-time 2 "$HEALTH_URL" >/dev/null 2>&1
            rc=$?
            echo "  Attempt ${attempt}/${MAX_ATTEMPTS}: curl exit ${rc}"
            if [ $rc -eq 0 ]; then
              echo "Stable slot health check passed."
              exit 0
            fi
            [ "$attempt" -lt "$MAX_ATTEMPTS" ] && sleep "$SLEEP_SEC"
          done
          echo "ERROR: Stable slot health check failed after ${MAX_ATTEMPTS} attempts."
          exit 1

      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          ENV="${{ inputs.environment }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="[OK]"
            printf -v MSG '%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s' \
              "${EMOJI} ${APP_NAME} promoted to STABLE (${ENV})" \
              "Source image: ${image_ref}" \
              "Stable image: ${STABLE_IMAGE_VERSIONED}" \
              "Stable URL:   ${STABLE_APP_URL}" \
              "Health:       ${STABLE_APP_URL}${HEALTH_PATH}" \
              "Run: ${RUN_URL}" \
              "This image is now the rollback target for ${APP_NAME} ${ENV}."
          else
            EMOJI="[FAIL]"
            printf -v MSG '%s\n\n%s\n%s\n%s\n\n%s' \
              "${EMOJI} ${APP_NAME} promote-to-stable FAILED (${ENV})" \
              "Source image: ${image_ref}" \
              "Stable tag attempted: ${STABLE_TAG}" \
              "Run: ${RUN_URL}" \
              "The live slot remains the last known-good. Check logs."
          fi

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" \
              || echo "WARN: Telegram notification failed (non-fatal)"
          else
            echo "WARN: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set - skipping notification"
          fi
